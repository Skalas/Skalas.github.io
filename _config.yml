# Site settings
title: Skalas
tagline: "Miguel Escalante — Data Scientist, Mathematician, Developer"
header-img: img/home-bg.jpg
logo: /img/favicon.ico
email: escalas5@gmail.com
description: >-
  Miguel Escalante — mathematician, developer, data scientist, data engineer,
  whovian. Notes on data science, machine learning, engineering, and life in
  Mexico City.
baseurl: ""
url: "https://skalas.me"
lang: en
timezone: America/Mexico_City

twitter_username: Skalas
github_username:  Skalas
facebook_username:  Skalas
instagram_username: Skalas
linkedin_url: skalas

# Default social card image (absolute URL resolved by jekyll-seo-tag)
image: /img/home-bg.jpg

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty
paginate: 5
exclude:
  - less
  - node_modules
  - Gruntfile.js
  - package.json
  - README.md
  - Rakefile
  - Gemfile
  - Gemfile.lock
  - scripts
  - mail

plugins:
  - jekyll-paginate
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# SEO / jekyll-seo-tag
author:
  name: Miguel Escalante
  email: escalas5@gmail.com
  url: https://skalas.me
  bio: "Data Scientist, Mathematician, Developer"
  location: "Mexico City, Mexico"
  twitter: Skalas
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Skalas"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/skalas"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter"
      url: "https://twitter.com/Skalas"

# jekyll-seo-tag social block (for JSON-LD sameAs)
social:
  name: Miguel Escalante
  links:
    - https://github.com/Skalas
    - https://linkedin.com/in/skalas
    - https://twitter.com/Skalas

twitter:
  username: Skalas
  card: summary_large_image

# Social media (legacy, kept for footer/nav templates)
social_media:
  - name: GitHub
    url: https://github.com/Skalas
  - name: LinkedIn
    url: https://linkedin.com/in/skalas
  - name: Twitter
    url: https://twitter.com/Skalas

# Feed settings
feed:
  path: feed.xml

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      image: /img/home-bg.jpg
      image_width: 1900
      image_height: 600
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      author: Miguel Escalante
